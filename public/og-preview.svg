    <rect x="36" y="40" width="254" height="24" rx="12" fill="#dbeafe" fill-opacity="0.85" />
    <rect x="36" y="84" width="192" height="24" rx="12" fill="#dbeafe" fill-opacity="0.6" />
    <rect x="36" y="136" width="128" height="56" rx="18" fill="#ffffff" fill-opacity="0.9" />
    <rect x="178" y="136" width="112" height="56" rx="18" fill="#93c5fd" fill-opacity="0.95" />
    <rect x="36" y="212" width="254" height="16" rx="8" fill="#e0f2fe" fill-opacity="0.6" />
