<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TalentTrust social preview</title>
  <desc id="desc">A branded social preview for TalentTrust showing safe freelance payments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <circle cx="1020" cy="120" r="160" fill="#ffffff" fill-opacity="0.08" />
  <circle cx="180" cy="540" r="220" fill="#ffffff" fill-opacity="0.06" />
  <rect x="84" y="80" width="145" height="145" rx="28" fill="#ffffff" fill-opacity="0.14" />
