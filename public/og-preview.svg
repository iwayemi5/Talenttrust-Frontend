  <text x="84" y="330" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">TalentTrust</text>
  <text x="84" y="396" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="400">Safe, secure payments for freelancers and clients</text>
  <text x="84" y="460" fill="#e0f2fe" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400">Clear milestones. Protected releases. Better trust.</text>
